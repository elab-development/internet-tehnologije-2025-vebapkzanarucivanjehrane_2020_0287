services:
  db:
    image: mysql:8.0
    container_name: app_db
    environment:
      MYSQL_DATABASE: dostava_hrane
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_pass
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  app:
    build:
      context: ./projekatapi
      dockerfile: ../docker/laravel/Dockerfile
    container_name: app_laravel
    working_dir: /var/www
    volumes:
      - ./projekatapi:/var/www
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: app_nginx
    ports:
      - "8000:80"
    volumes:
      - ./projekatapi:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  frontend:
    image: node:20-alpine
    container_name: app_front
    working_dir: /app
    volumes:
      - ./projekatfront:/app
    ports:
      - "3000:3000"
    stdin_open: true
    tty: true
    command: sh -c "npm install && npm start"

volumes:
  db_data: